version: '3.8'

services:
  # Development service
  lifesync-web-dev:
    container_name: lifesync-web-dev
    # image: node:lts-alpine
    build:
      context: .
      dockerfile: Dockerfile.dev
      # image: lifesync-web-dev-image
    ports:
      - "4000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Preserve container's node_modules (don't overwrite with host)
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
      - NEXT_PUBLIC_API_TIMEOUT=${NEXT_PUBLIC_API_TIMEOUT:-30000}
      - NEXT_PUBLIC_ENV=development
    networks:
      - lifesync-network
    working_dir: /app
    command:  npm run dev
    restart: unless-stopped

  # Production service (for testing production build locally)
  lifesync-web-prod:
    container_name: lifesync-web-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://api.lifesync.app/api}
      - NEXT_PUBLIC_API_TIMEOUT=${NEXT_PUBLIC_API_TIMEOUT:-30000}
      - NEXT_PUBLIC_ENV=production
    networks:
      - lifesync-network
    restart: unless-stopped
    profiles:
      - production

networks:
  lifesync-network:
    # driver: bridge
